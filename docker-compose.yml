services:
  valkey:
    image: valkey/valkey:9.1.0-alpine
    restart: unless-stopped
    networks:
      - cache
    command:
      - valkey-server
      - --save
      - ""
      - --appendonly
      - "no"
      - --maxmemory
      - ${MEDUSA_VALKEY_MAXMEMORY:-8gb}
      - --maxmemory-policy
      - allkeys-lru
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 6

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: medusa
      POSTGRES_PASSWORD: medusa
      POSTGRES_DB: medusa
    volumes:
      - medusa-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medusa -d medusa"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    networks:
      - default
      - cache
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://medusa:medusa@db:5432/medusa
      MEDUSA_DATA_DIR: /app/data
      MEDUSA_LOCAL_STORAGE_DIR: /app/data/originals
      HOME: /app/data/home
      XDG_CACHE_HOME: /app/data/model-cache
      HF_HOME: /app/data/model-cache/huggingface
      TORCH_HOME: /app/data/model-cache/torch
      MPLCONFIGDIR: /app/data/model-cache/matplotlib
      MEDUSA_DOCKER_SOCKET_PATH: ${MEDUSA_DOCKER_SOCKET_PATH:-/var/run/docker.sock}
      MEDUSA_BUILD_VERSION: ${MEDUSA_BUILD_VERSION:-}
      MEDUSA_BUILD_DATE: ${MEDUSA_BUILD_DATE:-}
      MEDUSA_BUILD_HASH: ${MEDUSA_BUILD_HASH:-}
      MEDUSA_GIT_SHA: ${MEDUSA_GIT_SHA:-}
      MEDUSA_RELEASE_STATUS_PATH: ${MEDUSA_RELEASE_STATUS_PATH:-/app/data/deploy/release-status.json}
      MEDUSA_RELEASE_REQUEST_PATH: ${MEDUSA_RELEASE_REQUEST_PATH:-/app/data/deploy/release-request.json}
      MEDUSA_CACHE_BACKEND: ${MEDUSA_CACHE_BACKEND:-valkey}
      MEDUSA_CACHE_URL: ${MEDUSA_CACHE_URL:-valkey://valkey:6379/0}
      MEDUSA_CACHE_TTL_SECONDS: ${MEDUSA_CACHE_TTL_SECONDS:-3600}
      MEDUSA_CACHE_MAX_PAYLOAD_BYTES: ${MEDUSA_CACHE_MAX_PAYLOAD_BYTES:-2097152}
      MEDUSA_CACHE_STARTUP_HYDRATE: ${MEDUSA_CACHE_STARTUP_HYDRATE:-true}
      MEDUSA_CACHE_HYDRATE_MAX_DOCUMENTS: ${MEDUSA_CACHE_HYDRATE_MAX_DOCUMENTS:-0}
      MEDUSA_CACHE_HYDRATE_PAGE_SIZE: ${MEDUSA_CACHE_HYDRATE_PAGE_SIZE:-50}
      MEDUSA_VALKEY_MAXMEMORY: ${MEDUSA_VALKEY_MAXMEMORY:-8gb}
    volumes:
      - ./data:/app/data
      - ./data/secrets:/app/data/secrets:ro
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  worker:
    build:
      context: ./backend
    networks:
      - default
      - cache
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://medusa:medusa@db:5432/medusa
      MEDUSA_DATA_DIR: /app/data
      MEDUSA_LOCAL_STORAGE_DIR: /app/data/originals
      HOME: /app/data/home
      XDG_CACHE_HOME: /app/data/model-cache
      HF_HOME: /app/data/model-cache/huggingface
      TORCH_HOME: /app/data/model-cache/torch
      MPLCONFIGDIR: /app/data/model-cache/matplotlib
      MEDUSA_BUILD_VERSION: ${MEDUSA_BUILD_VERSION:-}
      MEDUSA_BUILD_DATE: ${MEDUSA_BUILD_DATE:-}
      MEDUSA_BUILD_HASH: ${MEDUSA_BUILD_HASH:-}
      MEDUSA_GIT_SHA: ${MEDUSA_GIT_SHA:-}
      MEDUSA_RELEASE_STATUS_PATH: ${MEDUSA_RELEASE_STATUS_PATH:-/app/data/deploy/release-status.json}
      MEDUSA_RELEASE_REQUEST_PATH: ${MEDUSA_RELEASE_REQUEST_PATH:-/app/data/deploy/release-request.json}
      MEDUSA_CACHE_BACKEND: ${MEDUSA_CACHE_BACKEND:-valkey}
      MEDUSA_CACHE_URL: ${MEDUSA_CACHE_URL:-valkey://valkey:6379/0}
      MEDUSA_CACHE_TTL_SECONDS: ${MEDUSA_CACHE_TTL_SECONDS:-3600}
      MEDUSA_CACHE_MAX_PAYLOAD_BYTES: ${MEDUSA_CACHE_MAX_PAYLOAD_BYTES:-2097152}
      MEDUSA_VALKEY_MAXMEMORY: ${MEDUSA_VALKEY_MAXMEMORY:-8gb}
    volumes:
      - ./data:/app/data
      - ./data/secrets:/app/data/secrets:ro
    depends_on:
      db:
        condition: service_healthy
    command: python -m app.worker

  frontend:
    build:
      context: ./frontend
    environment:
      MEDUSA_API_PROXY: http://backend:8000
      MEDUSA_BUILD_VERSION: ${MEDUSA_BUILD_VERSION:-}
      MEDUSA_BUILD_DATE: ${MEDUSA_BUILD_DATE:-}
      MEDUSA_BUILD_HASH: ${MEDUSA_BUILD_HASH:-}
      MEDUSA_GIT_SHA: ${MEDUSA_GIT_SHA:-}
      MEDUSA_ALLOWED_HOSTS: ${MEDUSA_ALLOWED_HOSTS:-medusa.home.musial.io}
    expose:
      - "3737"
    depends_on:
      - backend
    command: /bin/sh -ec "npm run build && npm run preview"

  haproxy:
    image: haproxy:3.0-alpine
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      MEDUSA_PUBLIC_HOST: ${MEDUSA_PUBLIC_HOST:-medusa.home.musial.io}
      MEDUSA_PUBLIC_PORT: ${MEDUSA_PUBLIC_PORT:-3737}
      MEDUSA_HAPROXY_PORT: ${MEDUSA_HAPROXY_PORT:-3737}
    ports:
      - "${MEDUSA_BIND_IP:-0.0.0.0}:${MEDUSA_HAPROXY_PORT:-3737}:${MEDUSA_HAPROXY_PORT:-3737}"
    volumes:
      - ./deploy/haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - ./deploy/haproxy/restarting.html:/usr/local/etc/haproxy/restarting.html:ro
      - ./deploy/haproxy/medusa-emblem-proxy.png:/usr/local/etc/haproxy/medusa-emblem.png:ro
      - ./deploy/haproxy/medusa-emblem-night-proxy.png:/usr/local/etc/haproxy/medusa-emblem-night.png:ro
      - ./data/haproxy:/usr/local/etc/haproxy/certs:ro
    depends_on:
      - frontend
    command:
      - /bin/sh
      - -ec
      - |
        export MEDUSA_PUBLIC_HOST="$${MEDUSA_PUBLIC_HOST:-medusa.home.musial.io}"
        export MEDUSA_PUBLIC_PORT="$${MEDUSA_PUBLIC_PORT:-3737}"
        export MEDUSA_HAPROXY_PORT="$${MEDUSA_HAPROXY_PORT:-3737}"
        if [ "$${MEDUSA_PUBLIC_PORT}" = "443" ]; then
          public_port_suffix=""
        else
          public_port_suffix=":$${MEDUSA_PUBLIC_PORT}"
        fi
        awk \
          -v host="$${MEDUSA_PUBLIC_HOST}" \
          -v public_port="$${MEDUSA_PUBLIC_PORT}" \
          -v public_port_suffix="$${public_port_suffix}" \
          -v haproxy_port="$${MEDUSA_HAPROXY_PORT}" \
          '{
            gsub(/__MEDUSA_PUBLIC_HOST__/, host);
            gsub(/__MEDUSA_PUBLIC_PORT__/, public_port);
            gsub(/__MEDUSA_PUBLIC_PORT_SUFFIX__/, public_port_suffix);
            gsub(/__MEDUSA_HAPROXY_PORT__/, haproxy_port);
            print
          }' /usr/local/etc/haproxy/haproxy.cfg > /tmp/haproxy.cfg
        cat /usr/local/etc/haproxy/certs/fullchain.pem > /tmp/medusa.pem
        printf '\n' >> /tmp/medusa.pem
        cat /usr/local/etc/haproxy/certs/privatekey.pem >> /tmp/medusa.pem
        chmod 600 /tmp/medusa.pem
        exec haproxy -f /tmp/haproxy.cfg
    healthcheck:
      test: ["CMD-SHELL", "test -s /tmp/medusa.pem && test -s /tmp/haproxy.cfg && haproxy -c -f /tmp/haproxy.cfg"]
      interval: 10s
      timeout: 5s
      retries: 6

volumes:
  medusa-postgres:

networks:
  cache:
    internal: true
