services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: medusa
      POSTGRES_PASSWORD: medusa
      POSTGRES_DB: medusa
    volumes:
      - medusa-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medusa -d medusa"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://medusa:medusa@db:5432/medusa
      MEDUSA_DATA_DIR: /app/data
      MEDUSA_LOCAL_STORAGE_DIR: /app/data/originals
      HOME: /app/data/home
      XDG_CACHE_HOME: /app/data/model-cache
      HF_HOME: /app/data/model-cache/huggingface
      TORCH_HOME: /app/data/model-cache/torch
      MPLCONFIGDIR: /app/data/model-cache/matplotlib
      MEDUSA_DOCKER_SOCKET_PATH: ${MEDUSA_DOCKER_SOCKET_PATH:-/var/run/docker.sock}
    volumes:
      - ./data:/app/data
      - ./data/secrets:/app/data/secrets:ro
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  worker:
    build:
      context: ./backend
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://medusa:medusa@db:5432/medusa
      MEDUSA_DATA_DIR: /app/data
      MEDUSA_LOCAL_STORAGE_DIR: /app/data/originals
      HOME: /app/data/home
      XDG_CACHE_HOME: /app/data/model-cache
      HF_HOME: /app/data/model-cache/huggingface
      TORCH_HOME: /app/data/model-cache/torch
      MPLCONFIGDIR: /app/data/model-cache/matplotlib
    volumes:
      - ./data:/app/data
      - ./data/secrets:/app/data/secrets:ro
    depends_on:
      db:
        condition: service_healthy
    command: python -m app.worker

  frontend:
    build:
      context: ./frontend
    environment:
      MEDUSA_API_PROXY: http://backend:8000
      MEDUSA_BUILD_DATE: ${MEDUSA_BUILD_DATE:-}
      MEDUSA_BUILD_NUMBER: ${MEDUSA_BUILD_NUMBER:-}
      MEDUSA_ALLOWED_HOSTS: ${MEDUSA_ALLOWED_HOSTS:-medusa.home.musial.io}
    expose:
      - "3737"
    depends_on:
      - backend
    command: npm run dev

  haproxy:
    image: haproxy:3.0-alpine
    restart: unless-stopped
    ports:
      - "3737:3737"
    volumes:
      - ./deploy/haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - ./data/haproxy:/usr/local/etc/haproxy/certs:ro
    depends_on:
      - frontend
    command:
      - /bin/sh
      - -ec
      - |
        cat /usr/local/etc/haproxy/certs/fullchain.pem > /tmp/medusa.pem
        printf '\n' >> /tmp/medusa.pem
        cat /usr/local/etc/haproxy/certs/privatekey.pem >> /tmp/medusa.pem
        chmod 600 /tmp/medusa.pem
        exec haproxy -f /usr/local/etc/haproxy/haproxy.cfg
    healthcheck:
      test: ["CMD-SHELL", "test -s /tmp/medusa.pem && haproxy -c -f /usr/local/etc/haproxy/haproxy.cfg"]
      interval: 10s
      timeout: 5s
      retries: 6

volumes:
  medusa-postgres:
