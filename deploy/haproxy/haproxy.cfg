global
  log stdout format raw local0
  maxconn 2048
  tune.ssl.default-dh-param 2048

defaults
  log global
  mode http
  option httplog
  option dontlognull
  timeout connect 5s
  timeout client 300s
  timeout server 300s

resolvers docker
  nameserver dns 127.0.0.11:53
  resolve_retries 3
  timeout resolve 1s
  timeout retry 1s
  hold valid 10s

frontend medusa_mux
  mode tcp
  bind *:__MEDUSA_HAPROXY_PORT__
  tcp-request inspect-delay 1s
  acl has_payload req.len gt 0
  acl is_tls req.ssl_hello_type 1
  tcp-request content accept if is_tls
  tcp-request content accept if has_payload !is_tls
  use_backend medusa_tls_loopback if is_tls
  default_backend medusa_http_loopback

backend medusa_tls_loopback
  mode tcp
  server local_tls 127.0.0.1:8443 send-proxy-v2

backend medusa_http_loopback
  mode tcp
  server local_http 127.0.0.1:8080

frontend medusa_https
  mode http
  bind 127.0.0.1:8443 ssl crt /tmp/medusa.pem accept-proxy alpn h2,http/1.1
  option forwardfor
  acl api_request path /api
  acl api_request path_beg /api/
  acl medusa_emblem_day_request path /medusa-emblem.png
  acl medusa_emblem_night_request path /medusa-emblem-night.png
  acl medusa_emblem_legacy_request path /medusa-emblem.svg
  acl app_frontend_down nbsrv(medusa_frontend) eq 0
  http-request set-header X-Forwarded-Proto https
  http-request set-header X-Forwarded-Port __MEDUSA_PUBLIC_PORT__
  http-request set-header X-Forwarded-Host %[req.hdr(Host)]
  http-request return status 200 content-type image/png file /usr/local/etc/haproxy/medusa-emblem.png hdr Cache-Control no-store if app_frontend_down medusa_emblem_day_request
  http-request return status 200 content-type image/png file /usr/local/etc/haproxy/medusa-emblem-night.png hdr Cache-Control no-store if app_frontend_down medusa_emblem_night_request
  http-request return status 200 content-type image/png file /usr/local/etc/haproxy/medusa-emblem.png hdr Cache-Control no-store if app_frontend_down medusa_emblem_legacy_request
  http-request return status 200 content-type text/html file /usr/local/etc/haproxy/restarting.html hdr X-Medusa-Restarting true hdr Cache-Control no-store hdr Retry-After 2 if app_frontend_down !api_request
  http-response set-header Strict-Transport-Security "max-age=31536000"
  use_backend medusa_backend if api_request
  default_backend medusa_frontend

frontend medusa_http_redirect
  mode http
  bind 127.0.0.1:8080
  http-request redirect location https://__MEDUSA_PUBLIC_HOST____MEDUSA_PUBLIC_PORT_SUFFIX__%[url] code 301

frontend medusa_metrics_https
  mode http
  bind *:43737 ssl crt /tmp/medusa.pem alpn h2,http/1.1
  option forwardfor
  http-request set-header X-Forwarded-Proto https
  http-request set-header X-Forwarded-Port 43737
  http-request set-header X-Forwarded-Host %[req.hdr(Host)]
  http-response set-header Strict-Transport-Security "max-age=31536000"
  default_backend medusa_metrics

backend medusa_frontend
  mode http
  option httpchk
  http-check send meth GET uri / hdr Host __MEDUSA_PUBLIC_HOST____MEDUSA_PUBLIC_PORT_SUFFIX__
  http-check expect status 200
  server frontend frontend:3737 check resolvers docker init-addr none

backend medusa_backend
  mode http
  option httpchk
  http-check send meth GET uri /api/health hdr Host __MEDUSA_PUBLIC_HOST____MEDUSA_PUBLIC_PORT_SUFFIX__
  http-check expect status 200
  server backend backend:8000 check resolvers docker init-addr none

backend medusa_metrics
  mode http
  option httpchk
  http-check send meth GET uri /healthz hdr Host __MEDUSA_PUBLIC_HOST__:43737
  http-check expect status 200
  server metrics_exporter metrics-exporter:43737 check resolvers docker init-addr none

listen medusa_haproxy_stats
  mode http
  bind *:8404
  stats enable
  stats uri /stats
  stats refresh 10s
