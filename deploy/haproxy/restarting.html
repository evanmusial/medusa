<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex">
    <noscript><meta http-equiv="refresh" content="2"></noscript>
    <title>Medusa is under maintenance</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f5f7fb;
        --panel: #ffffff;
        --ink: #111827;
        --muted: #5f6b7a;
        --accent: #2563eb;
        --track: #e5ebf3;
        --line: #d8e0ea;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #111827;
          --panel: #172033;
          --ink: #f8fafc;
          --muted: #a8b3c4;
          --accent: #6ea8ff;
          --track: #243047;
          --line: #33415d;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: var(--bg);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(92vw, 520px);
        display: grid;
        justify-items: center;
        gap: clamp(4px, 1.2vmin, 10px);
        text-align: center;
      }

      .emblem-stage {
        position: relative;
        width: clamp(78px, 18vmin, 142px);
        height: clamp(78px, 18vmin, 142px);
        display: grid;
        place-items: center;
      }

      .emblem {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: contain;
        filter: drop-shadow(0 14px 26px rgba(15, 23, 42, 0.15));
      }

      .wordmark {
        color: var(--ink);
        font-family: "Century Schoolbook", "Century Schoolbook L", "New Century Schoolbook", Georgia, Cambria, "Times New Roman", Times, serif;
        font-size: clamp(38px, 11vmin, 86px);
        font-weight: 700;
        font-kerning: normal;
        letter-spacing: 0;
        line-height: 0.88;
        text-transform: lowercase;
        white-space: nowrap;
      }

      .head-snakes {
        position: absolute;
        top: -12%;
        left: -13%;
        width: 128%;
        height: 128%;
        overflow: visible;
        pointer-events: none;
        filter: drop-shadow(0 2px 4px rgba(37, 99, 235, 0.18));
      }

      .head-snake {
        --head-snake-anchor: 30% 44%;
        --head-snake-color: #2563eb;
        opacity: 0.72;
        transform-box: view-box;
        transform-origin: var(--head-snake-anchor);
        animation: head-snake-sway 1.65s ease-in-out infinite alternate;
      }

      .head-snake path {
        fill: none;
        stroke: var(--head-snake-color);
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-width: 3.7;
      }

      .head-snake circle {
        fill: var(--head-snake-color);
        stroke: var(--bg);
        stroke-width: 0.9;
      }

      .head-snake-2 {
        --head-snake-anchor: 38% 34%;
        --head-snake-color: #0f9f8d;
        animation-delay: -0.42s;
        animation-duration: 1.92s;
      }

      .head-snake-3 {
        --head-snake-anchor: 48% 29%;
        animation-delay: -0.8s;
        animation-duration: 1.48s;
      }

      .head-snake-4 {
        --head-snake-anchor: 29% 55%;
        --head-snake-color: #3b82f6;
        animation-delay: -1.06s;
        animation-duration: 2.08s;
      }

      .head-snake-5 {
        --head-snake-anchor: 42% 47%;
        --head-snake-color: #38bdf8;
        animation-delay: -0.2s;
        animation-duration: 1.74s;
      }

      @keyframes head-snake-sway {
        0% {
          transform: rotate(-6deg) scaleX(0.98);
        }
        50% {
          transform: rotate(4deg) scaleX(1.04);
        }
        100% {
          transform: rotate(8deg) scaleX(0.99);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .head-snake {
          animation: none;
        }
      }
    </style>
    <script>
      (() => {
        const minimumVisibleMs = 5000;
        const startedAt = Date.now();
        let reloadScheduled = false;

        const reloadWhenReady = () => {
          if (reloadScheduled) return;
          reloadScheduled = true;
          const remaining = Math.max(0, minimumVisibleMs - (Date.now() - startedAt));
          window.setTimeout(() => window.location.replace(window.location.href), remaining);
        };

        const checkMedusa = async () => {
          try {
            const probeUrl = new URL(window.location.href);
            probeUrl.searchParams.set("restart_probe", Date.now().toString(36));
            const response = await fetch(probeUrl.toString(), {
              cache: "no-store",
              credentials: "same-origin",
            });
            if (response.ok && response.headers.get("x-medusa-restarting") !== "true") {
              reloadWhenReady();
            }
          } catch {
            // The app can be between containers while Docker restarts.
          }
        };

        window.setTimeout(checkMedusa, 300);
        window.setInterval(checkMedusa, 1000);
      })();
    </script>
  </head>
  <body>
    <main aria-live="polite">
      <div class="emblem-stage">
        <picture>
          <source srcset="/medusa-emblem-night.png" media="(prefers-color-scheme: dark)">
          <img class="emblem" src="/medusa-emblem.png" alt="" aria-hidden="true">
        </picture>
        <svg class="head-snakes" viewBox="0 0 100 100" aria-hidden="true" focusable="false">
          <g class="head-snake head-snake-1">
            <path d="M21 45 C8 40 10 26 24 27 C35 28 33 15 45 14"></path>
            <circle cx="45" cy="14" r="2.5"></circle>
          </g>
          <g class="head-snake head-snake-2">
            <path d="M30 34 C22 23 30 11 41 14 C52 17 48 28 59 28"></path>
            <circle cx="59" cy="28" r="2.4"></circle>
          </g>
          <g class="head-snake head-snake-3">
            <path d="M41 28 C41 14 55 10 62 20 C68 29 58 33 68 42"></path>
            <circle cx="68" cy="42" r="2.3"></circle>
          </g>
          <g class="head-snake head-snake-4">
            <path d="M22 55 C10 55 8 67 21 69 C34 71 32 57 43 60"></path>
            <circle cx="43" cy="60" r="2.2"></circle>
          </g>
          <g class="head-snake head-snake-5">
            <path d="M36 47 C48 38 61 44 58 57 C56 68 44 57 42 69"></path>
            <circle cx="42" cy="69" r="2.1"></circle>
          </g>
        </svg>
      </div>
      <strong class="wordmark">medusa</strong>
    </main>
  </body>
</html>
