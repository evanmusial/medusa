<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex">
    <noscript><meta http-equiv="refresh" content="2"></noscript>
    <title>Medusa is under maintenance</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f5f7fb;
        --panel: #ffffff;
        --ink: #111827;
        --muted: #5f6b7a;
        --accent: #2563eb;
        --track: #e5ebf3;
        --line: #d8e0ea;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #111827;
          --panel: #172033;
          --ink: #f8fafc;
          --muted: #a8b3c4;
          --accent: #6ea8ff;
          --track: #243047;
          --line: #33415d;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: var(--bg);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(280px, calc(100vw - 32px));
        display: grid;
        justify-items: center;
        gap: 14px;
        text-align: center;
      }

      .emblem {
        width: 70px;
        height: 70px;
        display: block;
        object-fit: contain;
      }

      .wordmark {
        color: var(--accent);
        font-size: 16px;
        font-weight: 800;
        letter-spacing: 0;
        line-height: 1;
        text-transform: uppercase;
      }

      .progress-group {
        width: min(260px, 72vw);
        display: grid;
        justify-items: center;
      }

      .activity {
        position: relative;
        width: 100%;
        height: 8px;
        overflow: hidden;
        border-radius: 999px;
        background: var(--track);
        box-shadow: inset 0 0 0 1px var(--line);
      }

      .snake {
        position: absolute;
        top: 50%;
        display: block;
        width: 72px;
        height: 6px;
        border-radius: 999px;
        background:
          radial-gradient(circle at calc(100% - 5px) 50%, #f8fafc 0 1px, transparent 1.5px),
          repeating-linear-gradient(90deg, var(--accent) 0 8px, #22c55e 8px 16px);
        box-shadow: 0 0 10px rgba(37, 99, 235, 0.34);
        transform: translate(-92px, -50%);
        animation: snake-slither 1.7s ease-in-out infinite;
      }

      .snake::before {
        content: "";
        position: absolute;
        right: -5px;
        top: 50%;
        width: 11px;
        height: 11px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow:
          -2px 0 0 #22c55e,
          0 0 10px rgba(37, 99, 235, 0.34);
        transform: translateY(-50%);
      }

      .snake::after {
        content: "";
        position: absolute;
        right: -10px;
        top: 50%;
        width: 8px;
        height: 2px;
        border-radius: 999px;
        background: #ef4444;
        transform: translateY(-50%) scaleX(0.8);
        transform-origin: left center;
        animation: snake-tongue 0.42s ease-in-out infinite;
      }

      .snake.secondary {
        width: 54px;
        opacity: 0.82;
        animation-delay: -0.82s;
        animation-duration: 1.95s;
        filter: saturate(0.9);
      }

      @keyframes snake-slither {
        0% {
          transform: translate(-92px, -50%) rotate(0deg) scaleY(1);
        }
        38% {
          transform: translate(82px, -50%) rotate(1.5deg) scaleY(0.76);
        }
        72% {
          transform: translate(210px, -50%) rotate(-1deg) scaleY(1.08);
        }
        100% {
          transform: translate(310px, -50%) rotate(0deg) scaleY(1);
        }
      }

      @keyframes snake-tongue {
        0%,
        100% {
          opacity: 0.15;
          transform: translateY(-50%) scaleX(0.35);
        }
        50% {
          opacity: 1;
          transform: translateY(-50%) scaleX(1);
        }
      }
    </style>
    <script>
      (() => {
        const minimumVisibleMs = 2600;
        const startedAt = Date.now();
        let reloadScheduled = false;

        const reloadWhenReady = () => {
          if (reloadScheduled) return;
          reloadScheduled = true;
          const remaining = Math.max(0, minimumVisibleMs - (Date.now() - startedAt));
          window.setTimeout(() => window.location.replace(window.location.href), remaining);
        };

        const checkMedusa = async () => {
          try {
            const probeUrl = new URL(window.location.href);
            probeUrl.searchParams.set("restart_probe", Date.now().toString(36));
            const response = await fetch(probeUrl.toString(), {
              cache: "no-store",
              credentials: "same-origin",
            });
            if (response.ok && response.headers.get("x-medusa-restarting") !== "true") {
              reloadWhenReady();
            }
          } catch {
            // The app can be between containers while Docker restarts.
          }
        };

        window.setTimeout(checkMedusa, 300);
        window.setInterval(checkMedusa, 1000);
      })();
    </script>
  </head>
  <body>
    <main aria-live="polite">
      <picture>
        <source srcset="/medusa-emblem-night.png" media="(prefers-color-scheme: dark)">
        <img class="emblem" src="/medusa-emblem.png" alt="" aria-hidden="true">
      </picture>
      <strong class="wordmark">MEDUSA</strong>
      <div class="progress-group">
        <div class="activity" aria-label="Loading" role="progressbar">
          <span class="snake"></span>
          <span class="snake secondary"></span>
        </div>
      </div>
    </main>
  </body>
</html>
