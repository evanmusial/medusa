<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex">
    <noscript><meta http-equiv="refresh" content="2"></noscript>
    <title>Medusa is under maintenance</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f5f7fb;
        --panel: #ffffff;
        --ink: #111827;
        --muted: #5f6b7a;
        --accent: #2563eb;
        --track: #e5ebf3;
        --line: #d8e0ea;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #111827;
          --panel: #172033;
          --ink: #f8fafc;
          --muted: #a8b3c4;
          --accent: #6ea8ff;
          --track: #243047;
          --line: #33415d;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: var(--bg);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(360px, calc(100vw - 32px));
        display: grid;
        justify-items: center;
        gap: 10px;
        text-align: center;
      }

      .emblem-stage {
        position: relative;
        width: 92px;
        height: 84px;
        display: grid;
        place-items: center;
        margin-bottom: 0;
      }

      .emblem {
        width: 76px;
        height: 76px;
        display: block;
        object-fit: contain;
        filter: drop-shadow(0 10px 18px rgba(15, 23, 42, 0.12));
      }

      .wordmark {
        color: var(--accent);
        font-size: 16px;
        font-weight: 800;
        letter-spacing: 0;
        line-height: 1;
        text-transform: uppercase;
      }

      .progress-group {
        width: min(340px, 78vw);
        display: grid;
        justify-items: center;
      }

      .activity {
        position: relative;
        width: 100%;
        height: 48px;
        overflow: hidden;
        border-radius: 0;
        background: transparent;
        box-shadow: none;
        -webkit-mask-image: linear-gradient(to right, transparent 0, #000 11%, #000 89%, transparent 100%);
        mask-image: linear-gradient(to right, transparent 0, #000 11%, #000 89%, transparent 100%);
      }

      .snake {
        --snake-band: #22c55e;
        --snake-height: 44px;
        --snake-ink: var(--accent);
        --snake-speed: 4.4s;
        --snake-top: 1px;
        --snake-width: 190px;
        position: absolute;
        top: var(--snake-top);
        left: calc(-1 * var(--snake-width));
        display: block;
        width: var(--snake-width);
        height: var(--snake-height);
        overflow: visible;
        color: var(--snake-ink);
        filter: drop-shadow(0 7px 10px rgba(37, 99, 235, 0.28));
        pointer-events: none;
        animation: snake-travel var(--snake-speed) linear infinite;
        animation-delay: var(--snake-delay, 0s);
      }

      .snake.secondary {
        --snake-band: #60a5fa;
        --snake-height: 38px;
        --snake-ink: #0f9f8d;
        --snake-speed: 5.2s;
        --snake-top: 12px;
        --snake-width: 158px;
        opacity: 0.82;
        animation-delay: -1.6s;
      }

      .snake.tertiary {
        --snake-band: #60a5fa;
        --snake-height: 32px;
        --snake-speed: 3.85s;
        --snake-top: 18px;
        --snake-width: 132px;
        opacity: 0.66;
        animation-delay: -2.55s;
      }

      .snake-body,
      .snake-scales {
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .snake-body {
        stroke: var(--snake-ink);
        stroke-width: 10px;
      }

      .snake-scales {
        stroke: var(--snake-band);
        stroke-width: 10px;
        stroke-dasharray: 8 14;
        animation: snake-scales 0.7s linear infinite;
      }

      .snake-head {
        fill: var(--snake-ink);
      }

      .snake-head-mark {
        fill: var(--snake-band);
        opacity: 0.9;
      }

      .snake-eye {
        fill: #f8fafc;
      }

      .snake-tongue {
        fill: none;
        stroke: #ef4444;
        stroke-width: 2px;
        stroke-linecap: round;
        stroke-linejoin: round;
        transform-origin: 183px 22px;
        animation: snake-tongue 0.42s ease-in-out infinite;
      }

      @keyframes snake-travel {
        0% {
          left: calc(-1 * var(--snake-width));
          transform: translateY(0);
        }
        34% {
          transform: translateY(-1px);
        }
        68% {
          transform: translateY(1px);
        }
        100% {
          left: 100%;
          transform: translateY(0);
        }
      }

      @keyframes snake-scales {
        to {
          stroke-dashoffset: -22;
        }
      }

      @keyframes snake-tongue {
        0%,
        100% {
          opacity: 0.15;
          transform: scaleX(0.35);
        }
        50% {
          opacity: 1;
          transform: scaleX(1);
        }
      }
    </style>
    <script>
      (() => {
        const minimumVisibleMs = 5000;
        const startedAt = Date.now();
        let reloadScheduled = false;

        const reloadWhenReady = () => {
          if (reloadScheduled) return;
          reloadScheduled = true;
          const remaining = Math.max(0, minimumVisibleMs - (Date.now() - startedAt));
          window.setTimeout(() => window.location.replace(window.location.href), remaining);
        };

        const checkMedusa = async () => {
          try {
            const probeUrl = new URL(window.location.href);
            probeUrl.searchParams.set("restart_probe", Date.now().toString(36));
            const response = await fetch(probeUrl.toString(), {
              cache: "no-store",
              credentials: "same-origin",
            });
            if (response.ok && response.headers.get("x-medusa-restarting") !== "true") {
              reloadWhenReady();
            }
          } catch {
            // The app can be between containers while Docker restarts.
          }
        };

        window.setTimeout(checkMedusa, 300);
        window.setInterval(checkMedusa, 1000);
      })();
    </script>
  </head>

          <img class="emblem" src="/medusa-emblem.png" alt="" aria-hidden="true">
        </picture>

      <strong class="wordmark">MEDUSA</strong>

            </path>
            <path class="snake-scales" d="M5 22 C22 8 38 8 54 22 S86 36 102 22 S134 8 150 22 S166 32 174 22">
              <animate attributeName="d" dur="0.92s" repeatCount="indefinite" values="M5 22 C22 8 38 8 54 22 S86 36 102 22 S134 8 150 22 S166 32 174 22;M5 22 C22 36 38 36 54 22 S86 8 102 22 S134 36 150 22 S166 12 174 22;M5 22 C22 12 42 34 58 22 S90 10 106 22 S138 34 154 22 S168 16 174 22;M5 22 C22 8 38 8 54 22 S86 36 102 22 S134 8 150 22 S166 32 174 22"></animate>
            </path>
            <circle class="snake-head" cx="176" cy="22" r="8.5"></circle>
            <circle class="snake-head-mark" cx="171" cy="20" r="2.2"></circle>
            <circle class="snake-eye" cx="178.5" cy="18.8" r="1.2"></circle>
            <path class="snake-tongue" d="M183 22 L190 19 M183 22 L190 25"></path>
          </svg>
          <svg class="snake secondary" aria-hidden="true" focusable="false" viewBox="0 0 190 44">
            <path class="snake-body" d="M5 22 C22 8 38 8 54 22 S86 36 102 22 S134 8 150 22 S166 32 174 22">
              <animate attributeName="d" dur="0.92s" repeatCount="indefinite" values="M5 22 C22 8 38 8 54 22 S86 36 102 22 S134 8 150 22 S166 32 174 22;M5 22 C22 36 38 36 54 22 S86 8 102 22 S134 36 150 22 S166 12 174 22;M5 22 C22 12 42 34 58 22 S90 10 106 22 S138 34 154 22 S168 16 174 22;M5 22 C22 8 38 8 54 22 S86 36 102 22 S134 8 150 22 S166 32 174 22"></animate>
            </path>
            <path class="snake-scales" d="M5 22 C22 8 38 8 54 22 S86 36 102 22 S134 8 150 22 S166 32 174 22">
              <animate attributeName="d" dur="0.92s" repeatCount="indefinite" values="M5 22 C22 8 38 8 54 22 S86 36 102 22 S134 8 150 22 S166 32 174 22;M5 22 C22 36 38 36 54 22 S86 8 102 22 S134 36 150 22 S166 12 174 22;M5 22 C22 12 42 34 58 22 S90 10 106 22 S138 34 154 22 S168 16 174 22;M5 22 C22 8 38 8 54 22 S86 36 102 22 S134 8 150 22 S166 32 174 22"></animate>
            </path>
            <circle class="snake-head" cx="176" cy="22" r="8.5"></circle>
            <circle class="snake-head-mark" cx="171" cy="20" r="2.2"></circle>
            <circle class="snake-eye" cx="178.5" cy="18.8" r="1.2"></circle>
            <path class="snake-tongue" d="M183 22 L190 19 M183 22 L190 25"></path>
          </svg>
          <svg class="snake tertiary" aria-hidden="true" focusable="false" viewBox="0 0 190 44">
            <path class="snake-body" d="M5 22 C22 8 38 8 54 22 S86 36 102 22 S134 8 150 22 S166 32 174 22">
              <animate attributeName="d" dur="0.92s" repeatCount="indefinite" values="M5 22 C22 8 38 8 54 22 S86 36 102 22 S134 8 150 22 S166 32 174 22;M5 22 C22 36 38 36 54 22 S86 8 102 22 S134 36 150 22 S166 12 174 22;M5 22 C22 12 42 34 58 22 S90 10 106 22 S138 34 154 22 S168 16 174 22;M5 22 C22 8 38 8 54 22 S86 36 102 22 S134 8 150 22 S166 32 174 22"></animate>
            </path>
            <path class="snake-scales" d="M5 22 C22 8 38 8 54 22 S86 36 102 22 S134 8 150 22 S166 32 174 22">
              <animate attributeName="d" dur="0.92s" repeatCount="indefinite" values="M5 22 C22 8 38 8 54 22 S86 36 102 22 S134 8 150 22 S166 32 174 22;M5 22 C22 36 38 36 54 22 S86 8 102 22 S134 36 150 22 S166 12 174 22;M5 22 C22 12 42 34 58 22 S90 10 106 22 S138 34 154 22 S168 16 174 22;M5 22 C22 8 38 8 54 22 S86 36 102 22 S134 8 150 22 S166 32 174 22"></animate>
            </path>
            <circle class="snake-head" cx="176" cy="22" r="8.5"></circle>
            <circle class="snake-head-mark" cx="171" cy="20" r="2.2"></circle>
            <circle class="snake-eye" cx="178.5" cy="18.8" r="1.2"></circle>
            <path class="snake-tongue" d="M183 22 L190 19 M183 22 L190 25"></path>
          </svg>
        </div>
      </div>
    </main>
  </body>
