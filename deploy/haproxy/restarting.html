<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex">
    <noscript><meta http-equiv="refresh" content="2"></noscript>
    <title>Medusa is under maintenance</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f5f7fb;
        --panel: #ffffff;
        --ink: #111827;
        --muted: #5f6b7a;
        --accent: #2563eb;
        --track: #e5ebf3;
        --line: #d8e0ea;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #111827;
          --panel: #172033;
          --ink: #f8fafc;
          --muted: #a8b3c4;
          --accent: #6ea8ff;
          --track: #243047;
          --line: #33415d;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: var(--bg);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(280px, calc(100vw - 32px));
        display: grid;
        justify-items: center;
        gap: 14px;
        text-align: center;
      }

      .emblem {
        width: 70px;
        height: 70px;
        display: block;
        object-fit: contain;
      }

      .wordmark {
        color: var(--accent);
        font-size: 16px;
        font-weight: 800;
        letter-spacing: 0;
        line-height: 1;
        text-transform: uppercase;
      }

      .progress-group {
        width: min(260px, 72vw);
        display: grid;
        gap: 8px;
        justify-items: center;
      }

      .activity {
        width: 100%;
        height: 4px;
        overflow: hidden;
        border-radius: 999px;
        background: var(--track);
      }

      .activity span {
        display: block;
        width: 38%;
        height: 100%;
        border-radius: inherit;
        background: var(--accent);
        animation: progress 1.1s ease-in-out infinite;
      }

      .progress-label {
        color: var(--muted);
        font-size: 13px;
        font-weight: 650;
        line-height: 1;
      }

      @keyframes progress {
        0% {
          transform: translateX(-120%);
        }
        100% {
          transform: translateX(280%);
        }
      }
    </style>
    <script>
      (() => {
        const checkMedusa = async () => {
          try {
            const probeUrl = new URL(window.location.href);
            probeUrl.searchParams.set("restart_probe", Date.now().toString(36));
            const response = await fetch(probeUrl.toString(), {
              cache: "no-store",
              credentials: "same-origin",
            });
            if (response.ok && response.headers.get("x-medusa-restarting") !== "true") {
              window.location.replace(window.location.href);
            }
          } catch {
            // The app can be between containers while Docker restarts.
          }
        };

        window.setTimeout(checkMedusa, 300);
        window.setInterval(checkMedusa, 1000);
      })();
    </script>
  </head>
  <body>
    <main aria-live="polite">
      <picture>
        <source srcset="/medusa-emblem-night.png" media="(prefers-color-scheme: dark)">
        <img class="emblem" src="/medusa-emblem.png" alt="" aria-hidden="true">
      </picture>
      <strong class="wordmark">MEDUSA...</strong>
      <div class="progress-group">
        <span class="progress-label">Loading</span>
        <div class="activity" aria-label="Loading" role="progressbar"><span></span></div>
      </div>
    </main>
  </body>
</html>
