<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex">
    <meta http-equiv="refresh" content="2">
    <title>Medusa is under maintenance</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f5f7fb;
        --panel: #ffffff;
        --ink: #111827;
        --muted: #5f6b7a;
        --accent: #2563eb;
        --track: #e5ebf3;
        --line: #d8e0ea;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #111827;
          --panel: #172033;
          --ink: #f8fafc;
          --muted: #a8b3c4;
          --accent: #6ea8ff;
          --track: #243047;
          --line: #33415d;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: var(--bg);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(420px, calc(100vw - 32px));
        display: grid;
        justify-items: center;
        gap: 14px;
        text-align: center;
      }

      .emblem {
        width: 70px;
        height: 70px;
        display: block;
        object-fit: contain;
      }

      @media (prefers-color-scheme: dark) {
        .emblem {
          filter: invert(1);
        }
      }

      .copy {
        display: grid;
        gap: 6px;
      }

      .eyebrow {
        color: var(--accent);
        font-size: 12px;
        font-weight: 750;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        color: var(--ink);
        font-size: 21px;
        font-weight: 750;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.45;
      }

      .activity {
        width: min(260px, 72vw);
        height: 4px;
        overflow: hidden;
        border-radius: 999px;
        background: var(--track);
      }

      .activity span {
        display: block;
        width: 38%;
        height: 100%;
        border-radius: inherit;
        background: var(--accent);
        animation: progress 1.1s ease-in-out infinite;
      }

      @keyframes progress {
        0% {
          transform: translateX(-120%);
        }
        100% {
          transform: translateX(280%);
        }
      }
    </style>
  </head>
  <body>
    <main aria-live="polite">
      <img class="emblem" src="/medusa-emblem.svg" alt="" aria-hidden="true">
      <div class="copy">
        <div class="eyebrow">Medusa maintenance</div>
        <h1>Waiting for Medusa</h1>
        <p>The app is updating or coming back online. This page will keep checking and reload automatically.</p>
      </div>
      <div class="activity" aria-hidden="true"><span></span></div>
    </main>
  </body>
</html>
