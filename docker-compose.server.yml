# Server-only override for a dedicated Medusa host.
#
# Use with:
#   docker compose -f docker-compose.yml -f docker-compose.server.yml up -d --build
#
# The base docker-compose.yml remains the default for local development.

x-app-cpu: &app-cpu
  cpuset: "${MEDUSA_APP_CPUSET:-${MEDUSA_CPUSET:-0-5}}"

x-db-cpu: &db-cpu
  cpuset: "${MEDUSA_DB_CPUSET:-${MEDUSA_APP_CPUSET:-${MEDUSA_CPUSET:-0-5}}}"

x-worker-cpu: &worker-cpu
  cpuset: "${MEDUSA_WORKER_CPUSET:-${MEDUSA_CPUSET:-0-5}}"

services:
  db:
    <<: *db-cpu

  backend:
    <<: *app-cpu
    environment:
      MEDUSA_IMPORT_WORKER_CONCURRENCY: ${MEDUSA_IMPORT_WORKER_CONCURRENCY:-2}
      MEDUSA_DOCUMENT_CACHE_SIZE_MB: ${MEDUSA_DOCUMENT_CACHE_SIZE_MB:-51200}

  worker:
    <<: *worker-cpu
    environment:
      MEDUSA_IMPORT_WORKER_CONCURRENCY: ${MEDUSA_IMPORT_WORKER_CONCURRENCY:-2}
      MEDUSA_DOCUMENT_CACHE_SIZE_MB: ${MEDUSA_DOCUMENT_CACHE_SIZE_MB:-51200}

  frontend:
    <<: *app-cpu

  haproxy:
    <<: *app-cpu
    ports:
      - "[${MEDUSA_BIND_IPV6:-::1}]:3737:3737"

  valkey:
    <<: *app-cpu
