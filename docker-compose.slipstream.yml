services:
  slipstream-worker:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - path: .env.slipstream
        required: false
    volumes:
      - ./data:/app/data
    cpus: ${MEDUSA_SLIPSTREAM_CPUS:-12}
    command:
      - /bin/sh
      - -ec
      - >
        : "$${MEDUSA_SLIPSTREAM_SERVER:=https://medusa.evan.engineer:3737}";
        : "$${MEDUSA_SLIPSTREAM_WORK_DIR:=/app/data/slipstream-client}";
        : "$${MEDUSA_SLIPSTREAM_NAME:=Evan laptop Slipstream worker}";
        : "$${MEDUSA_SLIPSTREAM_VERSION:=slipstream-import-preprocess-1}";
        : "$${MEDUSA_SLIPSTREAM_CAPACITY:=2}";
        : "$${MEDUSA_SLIPSTREAM_CONCURRENCY:=2}";
        : "$${MEDUSA_SLIPSTREAM_POLL_SECONDS:=5}";
        : "$${MEDUSA_SLIPSTREAM_HEARTBEAT_SECONDS:=20}";
        : "$${MEDUSA_SLIPSTREAM_CHECK_IN_SECONDS:=30}";
        : "$${MEDUSA_SLIPSTREAM_CPUSET:=4-15}";
        set -- python -m app.slipstream.client
        --server "$${MEDUSA_SLIPSTREAM_SERVER}"
        --work-dir "$${MEDUSA_SLIPSTREAM_WORK_DIR}"
        --name "$${MEDUSA_SLIPSTREAM_NAME}"
        --version "$${MEDUSA_SLIPSTREAM_VERSION}"
        --capacity "$${MEDUSA_SLIPSTREAM_CAPACITY}"
        --concurrency "$${MEDUSA_SLIPSTREAM_CONCURRENCY}"
        --poll-seconds "$${MEDUSA_SLIPSTREAM_POLL_SECONDS}"
        --heartbeat-seconds "$${MEDUSA_SLIPSTREAM_HEARTBEAT_SECONDS}"
        --check-in-seconds "$${MEDUSA_SLIPSTREAM_CHECK_IN_SECONDS}"
        --cpuset "$${MEDUSA_SLIPSTREAM_CPUSET}"
        --capability import_preprocess
        --job-type import;
        if [ -n "$${MEDUSA_SLIPSTREAM_ENROLLMENT_TOKEN:-}" ]; then
          set -- "$$@" --enroll "$${MEDUSA_SLIPSTREAM_ENROLLMENT_TOKEN}";
        fi;
        exec "$$@"
